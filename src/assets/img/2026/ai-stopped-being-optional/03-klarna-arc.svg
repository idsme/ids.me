<line x1="420" y1="118" x2="478" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="480" y="58" width="160" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
