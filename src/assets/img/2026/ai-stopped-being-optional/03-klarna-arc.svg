<text class="th" fill="#444441" x="340" y="224" text-anchor="middle" dominant-baseline="central">Replacing ≠ redesigning</text>
<text class="ts" fill="#5F5E5A" x="340" y="244" text-anchor="middle" dominant-baseline="central">AI owns 67% of volume (routine). Humans own 33% (complex, emotional).</text>
