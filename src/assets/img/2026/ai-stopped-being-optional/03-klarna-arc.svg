<text class="ts" fill="#534AB7" x="560" y="102" text-anchor="middle" dominant-baseline="central">853 agents' work</text>
<text class="ts" fill="#534AB7" x="560" y="120" text-anchor="middle" dominant-baseline="central">$60M saved</text>
