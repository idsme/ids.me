<text class="ts" fill="#0F6E56" x="120" y="138" text-anchor="middle" dominant-baseline="central">$0.32→$0.19 / tx</text>
<text class="ts" fill="#0F6E56" x="120" y="156" text-anchor="middle" dominant-baseline="central">$40M projected</text>
