<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<style>
  .th{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500}
  .ts{font-family:system-ui,-apple-system,sans-serif;font-size:12px}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<line x1="60" y1="38" x2="620" y2="38" stroke="#B4B2A9" stroke-width="1.5"/>
<circle cx="120" cy="38" r="5" fill="#2C2C2A"/>
